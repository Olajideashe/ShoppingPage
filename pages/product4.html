<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Category</title>
    <link rel="stylesheet" href="../styles/product1.css">
    <script src="https://kit.fontawesome.com/8ea2e79f80.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header Section -->
    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active">WOMEN</a></li>
                <li><a href="#">MEN</a></li>
                <li><a href="#">KIDS</a></li>
            </ul>
            <div class="logo">
                <a href="../index.html">
                <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
            <div class="header-icons">
                <div class="currency-selector">
                    <input type="checkbox" id="currency-toggle">
                    <label for="currency-toggle" class="currency-btn">$ ˇ</label>
                    <ul class="currency-menu">
                        <li>$ USD</li>
                        <li>€ EUR</li>
                        <li>¥ JPY</li>
                    </ul>
                </div>
                <a href="./cart.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </div>
        </nav>
    </header>
    <main class="single-product">
        <div class="product-gallery">
            <div class="thumbnails">
                <img src="../images/product4.png" alt="Thumbnail 1">
                <img src="../images/product4.png" alt="Thumbnail 2">
                <img src="../images/product4.png" alt="Thumbnail 3">
            </div>
            <div class="main-image">
                <img src="../images/product4.png" alt="Main Product">
            </div>
        </div>
    
        <div class="product-details">
            <h1>Apollo</h1>
            <h2>Running Short</h2>
    
            <div class="size-selection">
                <p>SIZE:</p>
                <div class="sizes">
                    <button class="size">XS</button>
                    <button class="size active">S</button>
                    <button class="size">M</button>
                    <button class="size">L</button>
                </div>
            </div>
    
            <div class="color-selection">
                <p>COLOR:</p>
                <div class="colors">
                    <span class="color" style="background: #C0C0C0;"></span>
                    <span class="color" style="background: #222;"></span>
                    <span class="color" style="background: #0C6B58;"></span>
                </div>
            </div>
    
            <p class="price"><strong>$50.00</strong></p>
    
            <button class="add-to-cart">ADD TO CART</button>
    
            <p class="description">
                Find stunning women's cocktail dresses and party dresses. Stand out in lace and 
                metallic cocktail dresses and party dresses from all your favorite brands.
            </p>
        </div>
    </main>
    
</body>
