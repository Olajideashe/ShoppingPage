<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../styles/cart.css">
    <script src="https://kit.fontawesome.com/8ea2e79f80.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header Section -->
    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active">WOMEN</a></li>
                <li><a href="#">MEN</a></li>
                <li><a href="#">KIDS</a></li>
            </ul>
            <div class="logo">
                <a href="../index.html">
                    <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
            <div class="header-icons">
                <div class="currency-selector">
                    <input type="checkbox" id="currency-toggle">
                    <label for="currency-toggle" class="currency-btn">$ ˇ</label>
                    <ul class="currency-menu">
                        <li>$ USD</li>
                        <li>€ EUR</li>
                        <li>¥ JPY</li>
                    </ul>
                </div>
                <a href="./cart.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
            </div>
        </nav>
    </header>
    <main>
        <div class="cart-container">
            <h1>CART</h1>
            <div class="cart-items">
                <!-- First Cart Item -->
                <div class="cart-item">
                    <div class="item-details">
                        <h2>Apollo</h2>
                        <p>Running Short</p>
                        <p><strong>$50.00</strong></p>
                        <p>SIZE:</p>
                        <div class="size-options">
                            <button>XS</button>
                            <button class="selected">S</button>
                            <button>M</button>
                            <button>L</button>
                        </div>
                        <p>COLOR:</p>
                        <div class="color-options">
                            <span class="color-box select" style="background-color: #D3D3C9;"></span>
                            <span class="color-box" style="background-color: #333;"></span>
                            <span class="color-box" style="background-color: #1A5D44;"></span>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <button class="quantity-btn">+</button>
                        <span>1</span>
                        <button class="quantity-btn">-</button>
                    </div>
                    <div class="item-image">
                        <img src="../images/cart 1.png" alt="Apollo Running Short">
                    </div>
                </div>

                <!-- Second Cart Item -->
                <div class="cart-item">
                    <div class="item-details">
                        <h2>Jupiter</h2>
                        <p>Wayfarer</p>
                        <p><strong>$75.00</strong></p>
                        <p>SIZE:</p>
                        <div class="size-options">
                            <button>S</button>
                            <button class="selected">M</button>
                        </div>
                        <p>COLOR:</p>
                        <div class="color-options">
                            <span class="color-box select" style="background-color: #1A5D44;"></span>
                            <span class="color-box" style="background-color: #FF8C00;"></span>
                            <span class="color-box" style="background-color: #008B8B;"></span>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <button class="quantity-btn">+</button>
                        <span>2</span>
                        <button class="quantity-btn">-</button>
                    </div>
                    <div class="item-image">
                        <img src="../images/cart 2.png" alt="Jupiter Wayfarer">
                    </div>
                </div>
            </div>


            <!-- Summary Section -->
            <div class="cart-summary">
                <p>Tax 21%: <strong>$42.00</strong></p>
                <p>Quantity: <strong>3</strong></p>
                <p>Total: <strong>$200.00</strong></p>
                <button class="order-btn">ORDER</button>
            </div>
        </div>
    </main>
</body>
