<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Category</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/8ea2e79f80.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header Section -->
    <header>
        <nav>

    <main>
        <p class="title">Category Name</p>

            <a href="./pages/product1.html">

            <a href="./pages/product4.html">

            <a href="./pages/product5.html">

                <img src="./images/product5.png" alt="Product 5">

            </div>
            </a>
            <a href="./pages/product6.html">
            <div class="product">
                <img src="./images/product6.png" alt="Product 6">
                <p>Apollo Running Short</p>
                <p class="amount">$50.00</p>
